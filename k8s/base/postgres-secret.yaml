# Local-lab credentials only. NOT for production use.
# Values match the Docker Compose stack so behaviour is consistent.
# stringData keeps values human-readable for reviewers.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: managed-services-lab
type: Opaque
stringData:
  POSTGRES_PASSWORD: supportpass
  SPRING_DATASOURCE_USERNAME: supportuser
  SPRING_DATASOURCE_PASSWORD: supportpass
