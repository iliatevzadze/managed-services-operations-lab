# Stable in-cluster DNS for PostgreSQL: postgres.managed-services-lab:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: managed-services-lab
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
