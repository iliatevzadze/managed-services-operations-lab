# Managed Services Operations Lab — Prometheus configuration (Milestone 4)
# Proactive monitoring and alert rules for the customer application stack.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Customer application — Spring Boot Actuator / Micrometer Prometheus endpoint
  - job_name: "spring-support-api"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["spring-support-api:8080"]

  # Host metrics (CPU, memory, disk, network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Container metrics (per-container CPU, memory, restarts)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
