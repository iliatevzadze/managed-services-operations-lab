# Managed Services Operations Lab — Docker Compose (Milestone 2)
# Containerized customer application stack:
#   nginx (reverse proxy) -> spring-support-api -> postgres
#
# Usage:
#   docker compose up -d --build
#   docker compose ps
#   docker compose logs -f <service>
#   docker compose down            # stop, keep data volume
#   docker compose down -v         # stop and remove data volume

services:
  postgres:
    image: postgres:16-alpine
    container_name: msol-postgres
    environment:
      POSTGRES_DB: supportdb
      POSTGRES_USER: supportuser
      POSTGRES_PASSWORD: supportpass
    ports:
      - "127.0.0.1:15434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportuser -d supportdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - msol-net

  spring-support-api:
    build:
      context: ./app/spring-support-api
    container_name: msol-support-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/supportdb
      SPRING_DATASOURCE_USERNAME: supportuser
      SPRING_DATASOURCE_PASSWORD: supportpass
      SUPPORT_SIMULATION_ENABLED: "true"
    expose:
      - "8080"
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - msol-net

  nginx:
    image: nginx:1.27-alpine
    container_name: msol-nginx
    depends_on:
      - spring-support-api
    ports:
      - "127.0.0.1:18081:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - msol-net

  # --- Monitoring stack (Milestone 3) ---

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: msol-prometheus
    depends_on:
      - spring-support-api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - msol-net

  grafana:
    image: grafana/grafana:13.0.2
    container_name: msol-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:13003:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - msol-net

  alertmanager:
    image: prom/alertmanager:v0.33.0
    container_name: msol-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "127.0.0.1:19093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    networks:
      - msol-net

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: msol-node-exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    ports:
      - "127.0.0.1:19100:9100"
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - msol-net

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.2
    container_name: msol-cadvisor
    ports:
      - "127.0.0.1:18084:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - msol-net

volumes:
  postgres-data:
    name: msol-postgres-data
  prometheus-data:
    name: msol-prometheus-data
  grafana-data:
    name: msol-grafana-data

networks:
  msol-net:
    name: msol-net
