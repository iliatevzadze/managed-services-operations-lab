spring.application.name=spring-support-api

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/supportdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:supportuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:supportpass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

logging.level.com.managedservices.supportapi=INFO
