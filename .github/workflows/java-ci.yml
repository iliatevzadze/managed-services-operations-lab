# Managed Services Operations Lab — Java CI (Milestone 9)
# Validates the Spring Boot support API: unit tests + package build.
# No deployment, no registry push, no secrets.
name: Java CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/spring-support-api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build package
        run: mvn package -DskipTests
