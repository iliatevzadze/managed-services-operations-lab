# Managed Services Operations Lab — Kubernetes Manifests CI (Milestone 9)
# Clusterless, offline validation of the k8s/base/ manifests.
#
# kubectl dry-run is intentionally NOT used: even `--dry-run=client
# --validate=false` can still contact the API server for resource discovery,
# which fails when no cluster exists. kubeconform validates manifests against
# the Kubernetes JSON schemas entirely offline — no cluster, no kubectl.
#
# This validates manifest structure and schema locally.
# It intentionally does not contact a cluster.
# Full runtime validation is covered by scripts/k8s/deploy-kind.sh.
name: Kubernetes Manifests CI

on:
  push:
  pull_request:

jobs:
  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate manifests with kubeconform (offline)
        run: |
          docker run --rm -v "$PWD":/work -w /work \
            ghcr.io/yannh/kubeconform:latest -strict -summary k8s/base
