# Managed Services Operations Lab — Kubernetes Manifests CI (Milestone 9)
# Client-side validation of the k8s/base/ manifests. No cluster is created.
#
# `--dry-run=client --validate=false` parses the YAML and constructs the
# Kubernetes objects locally. --validate=false disables OpenAPI schema
# validation, which would otherwise try to reach a cluster API server
# (localhost:8080) when none is running.
#
# This validates YAML structure and Kubernetes object construction locally.
# It intentionally does not contact a cluster.
# Full runtime validation is covered by scripts/k8s/deploy-kind.sh.
name: Kubernetes Manifests CI

on:
  push:
  pull_request:

jobs:
  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kubectl (official stable release)
        run: |
          curl -fsSLO "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: kubectl version
        run: kubectl version --client

      # Validate the whole base/ directory in one pass.
      # --validate=false avoids contacting a cluster API server for schema checks.
      - name: Validate all base manifests
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/

      # Validate each manifest individually for clear per-file failures.
      - name: Validate namespace
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/namespace.yaml

      - name: Validate postgres secret
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/postgres-secret.yaml

      - name: Validate support-api configmap
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/support-api-configmap.yaml

      - name: Validate postgres deployment
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/postgres-deployment.yaml

      - name: Validate postgres service
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/postgres-service.yaml

      - name: Validate support-api deployment
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/support-api-deployment.yaml

      - name: Validate support-api service
        run: kubectl apply --dry-run=client --validate=false -f k8s/base/support-api-service.yaml
